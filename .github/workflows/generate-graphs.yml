name: Generate Contribution Graphs

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Pac-Man SVG
        uses: AndreRuperto/svg-pacman-contributions@main
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          theme: github-dark
          output_directory: dist

      - name: Generate 3D Contribution Graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & Push to output branch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin output
          git checkout output
          
          # Copy generated files to the root of output branch
          cp dist/pacman-contribution-graph-dark.svg . || true
          cp profile-3d-contrib/profile-night-green.svg isometric.svg || true
          
          git add pacman-contribution-graph-dark.svg isometric.svg
          git commit -m "chore: update contribution graphs" || exit 0
          git push
